    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/icon.png" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">



</head>

<body>
    <!-- Spinner Start -->
    <div id="spinner"
        class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>
    <!-- Spinner End -->


    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg bg-white navbar-light shadow sticky-top p-0">
        <a href="index.html" class="navbar-brand d-flex align-items-center px-4 px-lg-5">
            <p class="m-2 fw-bold" style="font-size: 25px;"><img src="img/icon.png" alt="" height="50px">Edu<span
                    style="color: var(--primary);">Stack</span></p>
        </a>
        <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <div class="navbar-nav ms-auto p-4 p-lg-0">
                <a href="index.html" class="nav-item nav-link">Home</a>
                <div class="nav-item dropdown">
                    <a href="#" class="nav-link dropdown-toggle active" data-bs-toggle="dropdown">Materials</a>
                    <div class="dropdown-menu fade-down m-0">
                        <a href="modules.html" class="dropdown-item active">Modules</a>
                        <a href="classic.html" class="dropdown-item">Classic Books</a>
                    </div>
                </div>
                <a href="syllabus.html" class="nav-item nav-link">Syllabus</a>
                <a href="about.html" class="nav-item nav-link">About</a>
                <a href="#" class="nav-item nav-link">
                    
                </a>
            </div>
        </div>
    </nav>
    <!-- Navbar End -->


    <!--  -->
    <div class="container-xxl py-5">
        <div class="container">
            <h2 class="mb-4 text-center" style="color: var(--primary);">Browse Modules</h2>

            <div class="row g-3 mb-4">

                <div class="col-md-6">
                    <select class="form-select" id="subjectFilter">
                        <option value="all">All Subjects</option>
                        <option value="physics">Physics</option>
                        <option value="chemistry">Chemistry</option>
                        <option value="maths">Maths</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search chapter...">
                </div>

            </div>

            <div class="row g-4" id="modulesContainer">

            </div>

            <div class="text-center mt-4 w-100">
                <button id="showMoreBtn" class="btn px-3" style="border-radius: 4px; position: relative; left: 50%; transform: translateX(-50%); color: #fff;" onclick="showMore()">
                    Show More
                </button>
            </div>

        </div>
    </div>
    <!--  -->

    <!-- Forward PopUp START (it will ask for theory or question via buttons with a top cross bar) -->
    <div class="modal fade" id="openModal" tabindex="-1" aria-labelledby="openModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            
            <div class="modal-header">
                <h5 class="modal-title" id="openModalLabel">Access Material</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <p>Select to Open</p>

                <div class="d-flex justify-content-center gap-3 mt-4">
                    <a href="#" id="theoryBtn" class="btn btn-primary" style="text-decoration: none; padding: 10px 30px; font-weight: 600; font-size: 16px;">
                        Theory
                    </a>

                    <a href="#" id="questionBtn" class="btn btn-secondary" style="text-decoration: none; padding: 10px 30px; font-weight: 600; font-size: 16px;">
                        Practice
                    </a>
                </div>
            </div>
            </div>
        </div>
    </div>
    
    <style>
        #theoryBtn, #questionBtn {
            border-radius: 6px;
            border: none;
        }

        #theoryBtn:hover {
            text-decoration: none;
            background: var(--primary) !important;
            color: white !important;
        }

        #questionBtn:hover {
            text-decoration: none;
            background: var(--primary) !important;
            color: white !important;
        }
    </style>
    <!-- Forward PopUp END -->


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Template Javascript -->
    <script src="js/modulesData.js"></script>
    <script src="js/modules.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
